name: Deploy Automático do Sistema (PS Eu Te Amo)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/apps/euteamo

            # 1. Puxa o código novo do GitHub
            git pull origin main

            # 2. Sincroniza as dependências do uv (incluindo o gunicorn que salvamos)
            /home/rogerio/.local/bin/uv sync --frozen

            # 3. Roda as migrações do banco por segurança
            .venv/bin/python manage.py migrate --no-input

            # 4. Coleta os arquivos estáticos (O que estava faltando!)
            .venv/bin/python manage.py collectstatic --no-input

            # 5. Reinicia o servidor web
            sudo systemctl restart euteamo.service
