name: Deploy Automático do Sistema (PS Eu Te Amo)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entra na pasta correta do servidor
            cd /var/www/webapps/euteamo

            # 2. Força o Git da VPS a se alinhar estritamente com o GitHub (limpa qualquer commit fantasma)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 3. Puxa as atualizações limpas do GitHub
            git pull origin main

            # 4. Sincroniza o ambiente usando o uv de forma limpa e atômica
            /home/rogerio/.local/bin/uv sync --frozen

            # 5. Coleta e compacta os arquivos estáticos (Pico.css, JS, imagens) na pasta certa
            .venv/bin/python manage.py collectstatic --no-input --clear

            # 6. Reinicia o serviço no systemd para atualizar o código na memória
            sudo systemctl restart euteamo.service
