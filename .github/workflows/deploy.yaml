name: Deploy Automático do Sistema (PS Eu Te Amo)

on:
  push:
    branches:
      - main # O deploy roda toda vez que você der 'git push origin main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entra na pasta onde o sistema roda na VPS (Ajuste o caminho abaixo)
            cd /var/www/apps/euteamo

            # 2. Puxa as alterações do GitHub para a VPS
            git pull origin main

            # 3. Sincroniza o ambiente com o 'uv' usando as dependências travadas do lock
            # (Usamos o caminho completo do uv caso ele não esteja no PATH global)
            uv sync --frozen

            # 4. Reinicia o servidor web/serviço para aplicar o código novo
            # (Ajuste para o nome do seu serviço do systemd, ex: gunicorn, uvloop, etc.)
            sudo systemctl restart nginx
