name: Deploy Automático do Sistema (PS Eu Te Amo)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entra na pasta correta identificada no servidor
            cd /var/www/apps/euteamo
            # 1. Força o Git da VPS a limpar as travas locais (Isso mata o ⇣7 e o U:77)
            git reset --hard HEAD
            git clean -fd

            # 2. Puxa as atualizações do GitHub
            git pull origin main

            # 3. Sincroniza o ambiente usando o uv de forma limpa e atômica
            /home/rogerio/.local/bin/uv sync --frozen

            # 4. Reinicia o serviço no systemd (Substitua pelo nome real do seu arquivo .service)
            sudo systemctl restart euteamo.service
