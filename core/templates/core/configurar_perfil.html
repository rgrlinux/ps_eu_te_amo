{% extends 'core/base.html' %}

{% block title %}Configurar Perfil{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2 class="title">Configurações do Perfil</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="input-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <div class="help-text">{{ field.help_text }}</div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-login">Salvar Configurações</button>
        </form>
    </div>
</div>
{% endblock %}
